workflows:
  ios-unsigned:
    name: iOS Ad Hoc Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO
          mkdir -p $CM_BUILD_DIR/Payload
          cp -r $CM_BUILD_DIR/Runner.xcarchive/Products/Applications/Runner.app \
            $CM_BUILD_DIR/Payload/Runner.app
          cd $CM_BUILD_DIR
          zip -r EscapeRoom.ipa Payload
    artifacts:
      - $CM_BUILD_DIR/EscapeRoom.ipa